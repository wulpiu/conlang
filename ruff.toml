line-length = 110
target-version = "py312"

[lint]
# Начальный, не пугающий набор правил:
# E/F  — реальные ошибки и опечатки (unused import, undefined name и т.п.)
# W    — предупреждения стиля
# I    — порядок импортов
select = ["E", "F", "W", "I"]

# Пока отключаем самые "шумные" для PyQt-кода правила:
# E501       — длина строки (у тебя много form.addRow(...) в одну строку, это ок)
# E701/E702  — точка с запятой / двоеточие на одной строке — сознательный
#              компактный стиль в UI-коде (self._x = Widget(); self._x.set...()),
#              не ошибка, трогать не будем
ignore = ["E501", "E701", "E702"]

[lint.per-file-ignores]
# В __init__.py нормально иметь "неиспользуемые" импорты — это реэкспорт
"__init__.py" = ["F401"]
